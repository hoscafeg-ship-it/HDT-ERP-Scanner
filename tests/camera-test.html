<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>ScanGo Camera Test</title>
  <link rel="stylesheet" href="./css/camera-test.css" />
</head>

<body>
  <div class="app">
    <header class="header">
      <h1>📷 ScanGo Camera Test</h1>
      <p>Camera Engine Test / V4 Quick</p>
    </header>

    <main class="camera-card">
      <video id="cameraVideo" autoplay playsinline muted></video>

      <div class="scan-guide">
        <div class="scan-line"></div>
      </div>
    </main>

    <section class="panel">
      <div class="row">
        <span>상태</span>
        <strong id="statusText">대기중</strong>
      </div>

      <div class="row">
        <span>해상도</span>
        <strong id="resolutionText">-</strong>
      </div>

      <div class="row">
        <span>카메라</span>
        <strong id="cameraText">-</strong>
      </div>
    </section>

    <div class="buttons">
      <button id="startBtn">카메라 시작</button>
      <button id="stopBtn">종료</button>
    </div>
  </div>

  <script type="module" src="./js/camera-test.js"></script>
</body>
</html>
