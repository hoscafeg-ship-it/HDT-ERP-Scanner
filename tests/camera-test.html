<!DOCTYPE html>
<html lang="ko">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,initial-scale=1">

<title>Camera Test</title>

<link rel="stylesheet" href="css/camera-test.css">

</head>

<body>

<div class="container">

<h1>📷 Camera Test</h1>

<div class="video-wrapper">

<video
id="camera"
autoplay
playsinline
muted>
</video>

<div class="scan-box"></div>

</div>

<div class="status">

<div>

Status :

Ready

</span>

</div>

</div>

<div class="buttons">

<button id="startBtn">

카메라 시작

</button>

<button id="stopBtn">

카메라 종료

</button>

</div>

</div>

<script type="module"
src="js/camera-test.js"></script>

</body>

</html>
