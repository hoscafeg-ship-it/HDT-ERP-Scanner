
<!DOCTYPE html>
<html lang="ko">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, viewport-fit=cover">

    <title>HDT ERP Scanner</title>

    <link rel="manifest" href="manifest.json">

    <meta name="theme-color" content="#111827">

    <link rel="icon" href="favicon.ico">

    <link rel="stylesheet" href="css/style.css">

</head>

<body>

<div class="container">

    <!-- 상단 -->
    <header class="header">

        <h1>🚀 HDT ERP Scanner</h1>

        <p class="version">
            Version 4.0.0-alpha
        </p>

    </header>

    <!-- 카메라 -->
    <main class="camera-area">

        <div id="reader">

            <div class="camera-placeholder">

                <div class="scan-box"></div>

                <p>카메라 준비중...</p>

            </div>

        </div>

    </main>

    <!-- 상태 -->
    <section class="status">

        <h3>상태</h3>

        <div id="statusText">

            대기중...

        </div>

    </section>

    <!-- 최근 스캔 -->
    <section class="history">

        <h3>최근 스캔</h3>

        <ul id="historyList">

            <li>아직 스캔 없음</li>

        </ul>

    </section>

    <!-- 버튼 -->
    <footer class="footer">

        <button id="startBtn">

            📷 스캔 시작

        </button>

    </footer>

</div>

<script src="js/app.js"></script>

</body>

</html>
