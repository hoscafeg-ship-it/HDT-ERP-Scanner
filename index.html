<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ScanGo Builder</title>
  <script type="module" crossorigin src="/HDT-ERP-Scanner/assets/main-xc3qvG0O.js"></script>
  <link rel="stylesheet" crossorigin href="/HDT-ERP-Scanner/assets/main-Bu8Rgc6w.css">
</head>

<body>
  <header>
    <h1>ScanGo Builder</h1>
    <p>카페24 엑셀 업로드 → 품목별 주문번호 Code128 생성</p>
  </header>

  <section class="upload-box">
    <input id="excelFile" type="file" accept=".xlsx,.xls">

    <button id="uploadTodayBtn" type="button">📤 오늘출고 생성</button>
    <button id="loadTodayBtn" type="button">📥 오늘출고 불러오기</button>
    <button id="printBtn" type="button">출력하기</button>
    <button id="startScanBtn" type="button">📷 스캔 시작</button>
    <button id="stopScanBtn" type="button">스캔 중지</button>

    <span id="countText">총 0개</span>
  </section>

  <section id="scannerBox" class="scanner-box" style="display:none;">
    <video id="scannerVideo" autoplay playsinline></video>
    <canvas id="scannerCanvas" style="display:none;"></canvas>
    <div id="scanStatus">카메라 대기중</div>
  </section>

  <main id="printArea"></main>


  <div id="confirmModal" class="modal hidden">
  <div class="modal-card">
    <div class="modal-title">📦 출고 확인</div>

    <div class="modal-number" id="modalNumber">#0</div>

    <div class="modal-product" id="modalProduct">상품명</div>

    <div class="modal-info">
      <div id="modalReceiver">👤 수령인</div>
      <div id="modalQty">📦 수량</div>
      <div id="modalBarcode">바코드</div>
    </div>

    <div class="modal-actions">
      <button id="modalCancelBtn" type="button">취소</button>
      <button id="modalConfirmBtn" type="button">출고완료</button>
    </div>
  </div>
</div>

<div id="toast" class="toast hidden">✅ 저장되었습니다</div>
</body>
</html>
